name: Build & Push to Docker Hub

on:
  push:
    branches: [ "main" ] # Chạy khi có code mới vào nhánh main

env:
  # 👇 TÊN IMAGE CHÍNH XÁC CỦA BẠN TRÊN DOCKER HUB
  IMAGE_NAME: hoangtugio198/inblue-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Đăng nhập vào Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Build Docker Image và Đẩy lên
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Đẩy lên với tag 'latest'
          tags: ${{ env.IMAGE_NAME }}:latest