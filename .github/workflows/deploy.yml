name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]

# Tự cancel các thread workflow cũ trên cùng 1 branch để tiết kiệm resource
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: hoangtugio198/inblue-backend

jobs:
  build-and-test-then-push:
    runs-on: ubuntu-latest

    # Service Container: Tạo DB ảo để Spring Boot test kết nối lúc khởi động
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: Inblue
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # Healthcheck đảm bảo DB sẵn sàng trước khi chạy Java
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Chay Test khoi dong spring context
      # 1. Dung chmod de cap quyen cho mvnw - mavenwrapper
      - name: Run Tests with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean verify
        env:
          # --- Cấu hình DB ảo ---
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/Inblue
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: password
          SPRING_JPA_HIBERNATE_DDL_AUTO: create

          # --- Fake env for bypass @Value check ---
          # Swagger
          APP_OPENAPI_PROD_URL: "https://api.fake-test.com"
          APP_OPENAPI_DEV_URL: "http://localhost:8080"

          # Cloudinary
          CLOUDINARY_CLOUD_NAME: "dummy-cloud"
          CLOUDINARY_API_KEY: "1234567890"
          CLOUDINARY_API_SECRET: "this-is-fake"

          # Daily.co
          DAILY_API_URL: "https://api.dummy.daily.co/v1"
          DAILY_DOMAIN: "dummy.daily.co"
          DAILY_API_KEY: "this-is-fake"

          # Redis
          REDIS_HOST: "fakeServer.com"
          REDIS_PORT: 1998
          REDIS_USERNAME: "default"
          REDIS_PASSWORD: "this_is_fake"

      # Chỉ chạy khi bước Test bên trên Success
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest