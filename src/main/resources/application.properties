spring.application.name=Inblue

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Swagger
app.openapi.prod-url=${APP_OPENAPI_PROD_URL}
app.openapi.dev-url=${APP_OPENAPI_DEV_URL}
springdoc.swagger-ui.filter=true

#Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#Daily.co
daily.api.url=${DAILY_API_URL}
daily.domain=${DAILY_DOMAIN}
daily.api.key=${DAILY_API_KEY}

#Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.username=${REDIS_USERNAME}
spring.data.redis.password=${REDIS_PASSWORD}

#Mail
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#PayOs
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.cancel-url=${PAYOS_CANCEL_URL:}
payos.return-url=${PAYOS_RETURN_URL:}

#Security
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=${JWT_EXPIRATION_MS}

#spring.security.oauth2.client.registration.google.client-id=${GOOLE_CLIENT_ID}
#spring.security.oauth2.client.registration.google.client-secret=${GOOLE_CLIENT_SECRET}
#spring.security.oauth2.client.registration.google.redirect-uri=GOOGLE_REDIRECT_URI
#spring.security.oauth2.client.registration.google.scope=GOOGLE_SCOPE
frontend.url=${FE_URL}
